# Run functional tests for Teams

name: Function Test Teams

# This is a reusable workflow called by the pipeline.
on:
  workflow_call:
    inputs:
      Thumbprint:
        required: true
        description: "The certificate thumbprint"
    secrets:
      PfxBase64:
        required: true
      PfxPassword:
        required: true
      TestParams:
        required: true
      TestParamsDev:
        required: true
      NotifierUsername:
        required: true
      NotifierPassword:
        required: true
  workflow_dispatch:

# permissions: read-all

jobs:
  Tms_Tenant1:
    name: Tms_Tenant1
    runs-on: windows-latest
    environment: Development
    permissions:
      id-token: write
      contents: write
    concurrency:
      group: Tms_Tenant1
      cancel-in-progress: false
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          path: repo
      # - name: Import PFX
      #   uses: ./repo/.github/actions/import-pfx
      #   with:
      #     PfxBase64: ${{ secrets.PfxBase64 }}
      #     PfxPassword: ${{ secrets.PfxPassword }}
      # - name: Get Thumbprint
      #   id: get-thumbprint
      #   uses: ./repo/.github/actions/get-thumbprint
      #   with:
      #     PfxPassword: ${{ secrets.PfxPassword }}
      - name: Restore ScubaGear
        uses: actions/cache/restore@v4
        with:
          path: C:\Program Files\WindowsPowerShell\Modules\ScubaGear
          key: scubagear-directory-
      - name: Restore Dependencies
        uses: actions/cache/restore@v4
        with:
          path: C:\Users\runneradmin\Documents\WindowsPowerShell\Modules
          key: powershell-directory-
      - name: Restore OPA
        uses: actions/cache/restore@v4
        with:
          path: C:\Users\runneradmin\.scubagear\Tools
          key: opa-directory-
      - name: Test
        id: test-product
        uses: ./repo/.github/actions/test-product
        # env:
        #   Thumbprint: ${{ steps.get-thumbprint.outputs.thumbprint }}
        with:
          Thumbprint: ${{ inputs.Thumbprint }}
          Alias: Tms_Tenant1
          TestParams: ${{ secrets.TestParams }}
      - name: Extract Email
        # if: ${{ failure() && (inputs.email-on-failure || github.event.schedule || github.event_name == 'push') }}
        uses: ./repo/.github/actions/extract-email
        env:
          Alias: Tms_Tenant1
          TestParams: ${{ secrets.TestParamsDev }}
      - name: Notify on Failure
        # if: ${{ failure() && (inputs.email-on-failure || github.event.schedule || github.event_name == 'push') }}
        if: ${{ success() }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.NotifierUsername }}
          password: ${{ secrets.NotifierPassword }}
          subject: Nightly functional test failure
          body: The Tms_Tenant1 test failed.  Please look at the "Nightly Product Functional Tests" workflow for more details.
          # to: ${{ steps.test-product.outputs.emails }}
          to: jgarriss@mitre.org
          from: ScubaGear Notifier
