  email:
    name: Email
    runs-on: windows-latest
    needs:
      - Tms_Tenant1
      - Tms_Tenant1_GCC
      - Tms_Tenant2
      - Tms_Tenant2_GCC
      - Tms_Tenant6
      - Tms_Tenant6_GCC
      - Tms_Tenant7
      - Tms_Tenant7_EX
    if: ${{ failure() && (inputs.EmailOnFailure || inputs.GitHubEventName == 'schedule') }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      - name: Extract Email
        id: extract-email
        uses: ./.github/actions/extract-email
        env:
          # Could use any of previous jobs as the alias
          Alias: Tms_Tenant1
          TestParams: ${{ secrets.TestParams }}
      - name: Notify on Failure
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.NotifierUsername }}
          password: ${{ secrets.NotifierPassword }}
          subject: "ScubaGear Functional Test Failure - Teams - branch: ${{ inputs.RefName || github.ref_name }}"
          to: ${{ steps.extract-email.outputs.emails }}
          from: ScubaGear Notifier
          body: |
            ScubaGear Functional Test Failure

            Product: Teams
            Branch: ${{ inputs.RefName || github.ref_name }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Tenant Job Results:
              Tms_Tenant1: ${{ needs.Tms_Tenant1.result }} (${{ needs.Tms_Tenant1.outputs.passed }}/${{ needs.Tms_Tenant1.outputs.total }} passing, ${{ needs.Tms_Tenant1.outputs.failed }} failed)
              Tms_Tenant1_GCC: ${{ needs.Tms_Tenant1_GCC.result }} (${{ needs.Tms_Tenant1_GCC.outputs.passed }}/${{ needs.Tms_Tenant1_GCC.outputs.total }} passing, ${{ needs.Tms_Tenant1_GCC.outputs.failed }} failed)
              Tms_Tenant2: ${{ needs.Tms_Tenant2.result }} (${{ needs.Tms_Tenant2.outputs.passed }}/${{ needs.Tms_Tenant2.outputs.total }} passing, ${{ needs.Tms_Tenant2.outputs.failed }} failed)
              Tms_Tenant2_GCC: ${{ needs.Tms_Tenant2_GCC.result }} (${{ needs.Tms_Tenant2_GCC.outputs.passed }}/${{ needs.Tms_Tenant2_GCC.outputs.total }} passing, ${{ needs.Tms_Tenant2_GCC.outputs.failed }} failed)
              Tms_Tenant6: ${{ needs.Tms_Tenant6.result }} (${{ needs.Tms_Tenant6.outputs.passed }}/${{ needs.Tms_Tenant6.outputs.total }} passing, ${{ needs.Tms_Tenant6.outputs.failed }} failed)
              Tms_Tenant6_GCC: ${{ needs.Tms_Tenant6_GCC.result }} (${{ needs.Tms_Tenant6_GCC.outputs.passed }}/${{ needs.Tms_Tenant6_GCC.outputs.total }} passing, ${{ needs.Tms_Tenant6_GCC.outputs.failed }} failed)
              Tms_Tenant7: ${{ needs.Tms_Tenant7.result }} (${{ needs.Tms_Tenant7.outputs.passed }}/${{ needs.Tms_Tenant7.outputs.total }} passing, ${{ needs.Tms_Tenant7.outputs.failed }} failed)
              Tms_Tenant7_EX: ${{ needs.Tms_Tenant7_EX.result }} (${{ needs.Tms_Tenant7_EX.outputs.passed }}/${{ needs.Tms_Tenant7_EX.outputs.total }} passing, ${{ needs.Tms_Tenant7_EX.outputs.failed }} failed)
