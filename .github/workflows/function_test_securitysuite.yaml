    name: Email
    runs-on: windows-latest
    needs:
      - Sec_Tenant1
      - Sec_Tenant1_G5
      - Sec_Tenant2
      - Sec_Tenant2_G3
      - Sec_Tenant6
      - Sec_Tenant6_G5
      - Sec_Tenant7
      - Sec_Tenant7_G5
    if: ${{ failure() && (inputs.EmailOnFailure || inputs.GitHubEventName == 'schedule') }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
      - name: Extract Email
        id: extract-email
        uses: ./.github/actions/extract-email
        env:
          # Could use any of previous jobs as the alias
          Alias: Sec_Tenant1
          TestParams: ${{ secrets.TestParams }}
      - name: Notify on Failure
        uses: dawidd6/action-send-mail@v17
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.NotifierUsername }}
          password: ${{ secrets.NotifierPassword }}
          subject: "ScubaGear Functional Test Failure - Security Suite - branch: ${{ inputs.RefName || github.ref_name }}"
          to: ${{ steps.extract-email.outputs.emails }}
          from: ${{ format('ScubaGear Notifier <{0}>', secrets.NotifierUsername) }}
          body: |
            ScubaGear Functional Test Failure

            Product: Security Suite
            Branch: ${{ inputs.RefName || github.ref_name }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Tenant Job Results:
              Sec_Tenant1: ${{ needs.Sec_Tenant1.result }} (${{ needs.Sec_Tenant1.outputs.passed }}/${{ needs.Sec_Tenant1.outputs.total }} passing, ${{ needs.Sec_Tenant1.outputs.failed }} failed)
              Sec_Tenant1_G5: ${{ needs.Sec_Tenant1_G5.result }} (${{ needs.Sec_Tenant1_G5.outputs.passed }}/${{ needs.Sec_Tenant1_G5.outputs.total }} passing, ${{ needs.Sec_Tenant1_G5.outputs.failed }} failed)
              Sec_Tenant2: ${{ needs.Sec_Tenant2.result }} (${{ needs.Sec_Tenant2.outputs.passed }}/${{ needs.Sec_Tenant2.outputs.total }} passing, ${{ needs.Sec_Tenant2.outputs.failed }} failed)
              Sec_Tenant2_G3: ${{ needs.Sec_Tenant2_G3.result }} (${{ needs.Sec_Tenant2_G3.outputs.passed }}/${{ needs.Sec_Tenant2_G3.outputs.total }} passing, ${{ needs.Sec_Tenant2_G3.outputs.failed }} failed)
              Sec_Tenant6: ${{ needs.Sec_Tenant6.result }} (${{ needs.Sec_Tenant6.outputs.passed }}/${{ needs.Sec_Tenant6.outputs.total }} passing, ${{ needs.Sec_Tenant6.outputs.failed }} failed)
