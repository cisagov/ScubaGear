              Sec_Tenant7: ${{ needs.Sec_Tenant7.result }} (${{ needs.Sec_Tenant7.outputs.passed }}/${{ needs.Sec_Tenant7.outputs.total }} passing, ${{ needs.Sec_Tenant7.outputs.failed }} failed)
