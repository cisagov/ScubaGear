# Purpose:  The purpose of this workflow is to delete all caches in the repo, as it has limited total cache storage.

name: Delete all workflow caches

# This is a reusable workflow called by the pipeline.
on:
  workflow_call:
  workflow_dispatch:

permissions: read-all

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      - name: Cleanup
        run: |
          gh extension install actions/gh-actions-cache
          gh actions-cache list
          cacheKeys=$(gh actions-cache list -R $REPO)
          set +e
          for cacheKey in $cacheKeys
          do
            gh actions-cache delete $cacheKey --confirm
          done
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
