# Purpose:  Test a solution to the concurrency issues for the nightly production functional tests
# NOTE:  This is intended to be a temporary workflow.

name: Test Concurrency with Nightly Functional Tests

on:
  schedule:
    - cron: "15 4 * * 0-4"
  workflow_dispatch:
    inputs:
      # checkov:skip=CKV_GHA_7:Manual inputs are desired.
      email-on-failure:
        description: Check to send an email on failure
        type: boolean
        required: true
        default: false
  # For debugging only
  push:
    paths:
      - ".github/workflows/test_concurrency.yaml"
      - ".github/actions/**"

permissions: read-all

jobs:
  Tms_Tenant1:
    name: Test Tms_Tenant1
    runs-on: windows-latest
    concurrency:
      group: Tms_Tenant1
      cancel-in-progress: false
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      - name: Import PFX
        uses: ./.github/actions/import-pfx
        env:
          PfxBase64: ${{ secrets.NIGHTLY_TEST_BUILD_PFX }}
          PfxPassword: ${{ secrets.NIGHTLY_TEST_BUILD_PW }}
      - name: Get Thumbprint
        id: get-thumbprint
        uses: ./.github/actions/get-thumbprint
        env:
          PfxPassword: ${{ secrets.NIGHTLY_TEST_BUILD_PW }}
      - name: Import Modules
        uses: ./.github/actions/import-modules
      - name: Test Tms_Tenant1
        id: test-product
        uses: ./.github/actions/test-product
        env:
          Thumbprint: ${{ steps.get-thumbprint.outputs.thumbprint }}
          Alias: Tms_Tenant1
          TestParams: ${{ secrets.NIGHTLY_TEST_BUILD_PARAMS }}
      - name: Notify on Failure
        if: ${{ failure() && (inputs.email-on-failure || github.event.schedule || github.event_name == 'push') }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.NOTIFIER_EMAIL_USERNAME }}
          password: ${{ secrets.NOTIFIER_EMAIL_PASSWORD }}
          subject: Nightly functional test failure
          body: The Tms_Tenant1 test failed.  Please look at the "Nightly Product Functional Tests" workflow for more details.
          to: ${{ steps.test-product.outputs.emails }}
          from: ScubaGear Notifier
