# Purpose:  Test a solution to the concurrency issues for the nightly production functional tests

# NOTE:  This is intended to be a temporary workflow.

name: Test Concurrency with Nightly Functional Tests

on:
  schedule:
    - cron: "15 4 * * 0-4"
  workflow_dispatch:
    inputs:
      # checkov:skip=CKV_GHA_7:Manual inputs are desired.
      email-on-failure:
        description: Check to send an email on failure
        type: boolean
        required: true
        default: false
  # For debugging only
  push:
    paths:
      - ".github/workflows/test_concurrency.yaml"
      - ".github/workflows/function_test_teams.yaml"
      - ".github/actions/**"

# permissions: read-all

env:
  GalleryName: PrivateScubaGearGallery

jobs:
  Tms_Tenant1:
    name: Test Teams on Tenant 1
    uses: ./.github/workflows/function_test_teams.yaml
