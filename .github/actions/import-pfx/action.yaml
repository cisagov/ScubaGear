name: Import PFX
secrets:
  ThisPfxBase64:
  ThisPfxPassword:
runs:
  using: "composite"
  steps:
    - run: |
        cd repo
        # Create PFX
        New-Item -ItemType file -Path ./key.txt
        Set-Content -Path ./key.txt -Value ${{ secrets.ThisPfxBase64 }}
        certutil -decode ./key.txt ./key.pfx
        # Import FPX
        # Pipe to Out-Null to hide the thumbprint
        Import-PfxCertificate -Password (ConvertTo-SecureString -String ${{ secrets.ThisPfxPassword }} -AsPlainText -Force) -CertStoreLocation Cert:\CurrentUser\My -FilePath ./key.pfx | Out-Null
      shell: powershell
