  - PolicyId: MS.SECURITYSUITE.3.1v1
    TestDriver: ScubaCached
    Tests:
      - TestDescription: MS.SECURITYSUITE.3.1v1 Compliant case - DLP policy covers all three required sensitive info types
        Preconditions:
          - Command: UpdateProviderExport
            Splat:
              Updates:
                defender_dlp_license: true
                defender_license: true
                dlp_compliance_policies:
                  - ExchangeLocation:
                      - All
                    SharePointLocation:
                      - All
                    TeamsLocation:
                      - All
                    EndpointDlpLocation:
                      - All
                    OneDriveLocation:
                      - All
                    Workload: "Exchange, SharePoint, OneDriveForBusiness, Teams, EndpointDevices"
                    Name: "SCUBA Test DLP Policy"
                    Mode: "Enable"
                    Enabled: true
                dlp_compliance_rules:
                  - ContentContainsSensitiveInformation:
                      - name: "U.S. Social Security Number (SSN)"
                      - name: "U.S. Individual Taxpayer Identification Number (ITIN)"
                      - name: "Credit Card Number"
                    Name: "SCUBA Test DLP Rule"
                    Disabled: false
                    ParentPolicyName: "SCUBA Test DLP Policy"
                    BlockAccess: true
                    BlockAccessScope: "All"
                    NotifyUser:
                      - SiteAdmin
                    NotifyUserType: "NotSet"
                    IsAdvancedRule: false
                    EndpointDlpRestrictions:
                      - setting: "UnallowedApps"
                        value: "Block"
                      - setting: "UnallowedBluetoothTransferApps"
                        value: "Block"
        Postconditions: []
        ExpectedResult: true
      - TestDescription: MS.SECURITYSUITE.3.1v1 Non-Compliant case - DLP rule is missing Credit Card Number protection
        Preconditions:
