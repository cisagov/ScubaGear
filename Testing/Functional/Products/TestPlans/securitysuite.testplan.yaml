                protection_policy_rules[0].SentTo: ["user@example.com"]
                protection_policy_rules[1].SentTo: ["user@example.com"]
        Postconditions: []
        ExpectedResult: false
  - PolicyId: MS.SECURITYSUITE.2.4v1
    TestDriver: ScubaCached
    Tests:
      - TestDescription: MS.SECURITYSUITE.2.4v1 Compliant case - default policy has all safety tips enabled
        Preconditions:
          - Command: Set-DefaultAntiPhishSafetyTips
            Splat:
              Enabled: true
        Postconditions: []
        ExpectedResult: true
      - TestDescription: MS.SECURITYSUITE.2.4v1 Non-Compliant case - safety tips disabled on default policy
        Preconditions:
          - Command: Set-DefaultAntiPhishSafetyTips
            Splat:
              Enabled: false
          - Command: UpdateProviderExport
