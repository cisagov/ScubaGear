  - PolicyId: MS.SECURITYSUITE.1.3v1
    TestDriver: ScubaCached
    Tests:
      - TestDescription: MS.SECURITYSUITE.1.3v1 Compliant case - Strict preset active for safe attachments and covers all recipients
        Preconditions:
          - Command: UpdateProviderExport
            Splat:
              Updates:
                atp_policy_rules:
                  - Identity: Strict Preset Security Policy
                    State: Enabled
                    SentTo: []
                    SentToMemberOf: []
                    RecipientDomainIs: []
                safe_attachment_rules: []
                safe_attachment_policies:
                  - Identity: Strict Preset Security Policy
                    Action: Block
                  - Identity: Built-In Protection Policy
                    Action: Block
                built_in_protection_rules:
                  - ExceptIfSentTo: []
                    ExceptIfSentToMemberOf: []
                    ExceptIfRecipientDomainIs: []
        Postconditions: []
        ExpectedResult: true
      - TestDescription: MS.SECURITYSUITE.1.3v1 Compliant case - Standard preset active for safe attachments and covers all recipients
        Preconditions:
          - Command: UpdateProviderExport
            Splat:
              Updates:
                atp_policy_rules:
                  - Identity: Standard Preset Security Policy
                    State: Enabled
                    SentTo: []
                    SentToMemberOf: []
                    RecipientDomainIs: []
                safe_attachment_rules: []
                safe_attachment_policies:
                  - Identity: Standard Preset Security Policy
                    Action: DynamicDelivery
                  - Identity: Built-In Protection Policy
                    Action: Block
                built_in_protection_rules:
                  - ExceptIfSentTo: []
                    ExceptIfSentToMemberOf: []
                    ExceptIfRecipientDomainIs: []
        Postconditions: []
        ExpectedResult: true
      - TestDescription: MS.SECURITYSUITE.1.3v1 Non-Compliant case - No preset or custom safe attachments policy applies to all recipients, and at least one user is excluded from Built-In Protection
        Preconditions:
          - Command: UpdateProviderExport
            Splat:
              Updates:
                atp_policy_rules: []
                safe_attachment_rules: []
                safe_attachment_policies:
                  - Identity: Built-In Protection Policy
                    Action: Block
                built_in_protection_rules:
                  - ExceptIfSentTo: [user@example.com]
                    ExceptIfSentToMemberOf: []
                    ExceptIfRecipientDomainIs: []
        Postconditions: []
        ExpectedResult: false
      - TestDescription: MS.SECURITYSUITE.1.3v1 Compliant case - No preset or custom safe attachments policy applies to all recipients, but no users are excluded from Built-In Protection
        Preconditions:
          - Command: UpdateProviderExport
            Splat:
              Updates:
                atp_policy_rules: []
                safe_attachment_rules: []
                safe_attachment_policies:
                  - Identity: Built-In Protection Policy
                    Action: Block
                built_in_protection_rules:
                  - ExceptIfSentTo: []
                    ExceptIfSentToMemberOf: []
                    ExceptIfRecipientDomainIs: []
        Postconditions: []
        ExpectedResult: true
      - TestDescription: MS.SECURITYSUITE.1.3v1 Compliant case - Custom safe attachments policy targeted at all accepted domains covers all recipients with a compliant malware response action
        Preconditions:
          - Command: UpdateProviderExport
            Splat:
              Updates:
                # A safe attachment rule cannot be created without a target (user, group,
                # or domain), so "covers all recipients" is exercised here the way an
                # admin would realistically achieve it: scoping RecipientDomainIs to
                # every domain in accepted_domains.
                accepted_domains:
                  - DomainName: contoso.com
                atp_policy_rules: []
                safe_attachment_rules:
                  - State: Enabled
                    Priority: 0
                    SafeAttachmentPolicy: FunctionalTest SafeAttachmentPolicy
                    SentTo: []
                    SentToMemberOf: []
                    ExceptIfSentTo: []
                    ExceptIfSentToMemberOf: []
                    ExceptIfRecipientDomainIs: []
                    RecipientDomainIs: [contoso.com]
                safe_attachment_policies:
                  - Identity: FunctionalTest SafeAttachmentPolicy
                    Action: Block
                  - Identity: Built-In Protection Policy
                    Action: Block
                built_in_protection_rules:
                  - ExceptIfSentTo: []
                    ExceptIfSentToMemberOf: []
                    ExceptIfRecipientDomainIs: []
        Postconditions: []
        ExpectedResult: true
      - TestDescription: MS.SECURITYSUITE.1.3v1 Non-Compliant case - Custom safe attachments policy targeted at all accepted domains covers all recipients but has a non-compliant malware response action
        Preconditions:
          - Command: UpdateProviderExport
            Splat:
              Updates:
                accepted_domains:
                  - DomainName: contoso.com
                atp_policy_rules: []
                safe_attachment_rules:
                  - State: Enabled
                    Priority: 0
                    SafeAttachmentPolicy: FunctionalTest SafeAttachmentPolicy
                    SentTo: []
                    SentToMemberOf: []
                    ExceptIfSentTo: []
                    ExceptIfSentToMemberOf: []
                    ExceptIfRecipientDomainIs: []
                    RecipientDomainIs: [contoso.com]
                safe_attachment_policies:
                  - Identity: FunctionalTest SafeAttachmentPolicy
                    Action: Allow
                  - Identity: Built-In Protection Policy
                    Action: Block
                built_in_protection_rules:
                  - ExceptIfSentTo: []
                    ExceptIfSentToMemberOf: []
                    ExceptIfRecipientDomainIs: []
        Postconditions: []
        ExpectedResult: false

