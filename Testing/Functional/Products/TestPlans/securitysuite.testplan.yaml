  - PolicyId: MS.SECURITYSUITE.2.1v1
    TestDriver: ScubaCached
    Tests:
      - TestDescription: MS.SECURITYSUITE.2.1v1 Compliant case - sensitive user matches tenant policy
        Preconditions:
          - Command: UpdateProviderExport
            Splat:
              Updates:
                scuba_config.SecuritySuite:
                  MS.SECURITYSUITE.2.1v1:
                    SensitiveUsers:
                      - AgencyUserGlobalReader;agencyuserglobalreader@tqhjy.onmicrosoft.com
          - Command: Set-DefaultAntiPhishSensitiveUsers
            Splat:
              SensitiveUsers:
                - AgencyUserGlobalReader;agencyuserglobalreader@tqhjy.onmicrosoft.com
        Postconditions: []
        ExpectedResult: true
      - TestDescription: MS.SECURITYSUITE.2.1v1 Compliant case - sensitive user specified as email only
        Preconditions:
          - Command: UpdateProviderExport
            Splat:
              Updates:
                scuba_config.SecuritySuite:
                  MS.SECURITYSUITE.2.1v1:
                    SensitiveUsers:
                      - agencyuserglobalreader@tqhjy.onmicrosoft.com
          - Command: Set-DefaultAntiPhishSensitiveUsers
            Splat:
              SensitiveUsers:
                - agencyuserglobalreader@tqhjy.onmicrosoft.com
        Postconditions: []
        ExpectedResult: true
      - TestDescription: MS.SECURITYSUITE.2.1v1 Non-Compliant case - sensitive user not in tenant policy
        Preconditions:
          - Command: UpdateProviderExport
            Splat:
              Updates:
                scuba_config.SecuritySuite:
                  MS.SECURITYSUITE.2.1v1:
                    SensitiveUsers:
                      - Mismatched User;mmuser@someemail.com
        Postconditions: []
        ExpectedResult: false
      - TestDescription: MS.SECURITYSUITE.2.1v1 Non-Compliant case - no sensitive users in config file
        Preconditions:
          - Command: UpdateProviderExport
            Splat:
              Updates:
                scuba_config.SecuritySuite:
                  MS.SECURITYSUITE.2.1v1: {}
        Postconditions: []
        ExpectedResult: false
  - PolicyId: MS.SECURITYSUITE.2.2v1
    TestDriver: ScubaCached
    Tests:
      - TestDescription: MS.SECURITYSUITE.2.2v1 Non-Compliant case - include domains I own is disabled
        Preconditions:
          - Command: Set-AllAntiPhishPolicyProperty
            Splat:
              PropertyName: EnableOrganizationDomainsProtection
              Value: false
        Postconditions: []
        ExpectedResult: false
      - TestDescription: MS.SECURITYSUITE.2.2v1 Compliant case - include domains I own is enabled
        Preconditions:
          - Command: UpdateProviderExport
            Splat:
              Updates:
                anti_phish_policies[0].EnableOrganizationDomainsProtection: true
        Postconditions: []
        ExpectedResult: true
  - PolicyId: MS.SECURITYSUITE.2.3v1
