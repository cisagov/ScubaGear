ProductName: securitysuite
TestPlan:
  - PolicyId: MS.SECURITYSUITE.1.1v1
    TestDriver: ScubaCached
    Tests:
      - TestDescription: MS.SECURITYSUITE.1.1v1 Not Checked # TODO update once implemented
        Preconditions: []
        Postconditions: []
        IsNotChecked: true
        ExpectedResult: false
  - PolicyId: MS.SECURITYSUITE.4.1v1
    TestDriver: ScubaCached
    Tests:
      - TestDescription: MS.SECURITYSUITE.4.1v1 Non-Compliant case - Required alert is disabled
        Preconditions:
          - Command: UpdateProviderExport
            Splat:
              Updates:
                protection_alerts:
                  - Name: Suspicious email sending patterns detected
                    Disabled: true
                  - Name: Suspicious connector activity
                    Disabled: false
                  - Name: Suspicious Email Forwarding Activity
                    Disabled: false
                  - Name: Messages have been delayed
                    Disabled: false
                  - Name: Tenant restricted from sending unprovisioned email
                    Disabled: false
                  - Name: Tenant restricted from sending email
                    Disabled: false
                  - Name: A potentially malicious URL click was detected
                    Disabled: false
        Postconditions: []
        ExpectedResult: false
      - TestDescription: MS.SECURITYSUITE.4.1v1 Compliant case - Required alerts are enabled
        Preconditions:
          - Command: UpdateProviderExport
            Splat:
              Updates:
                protection_alerts:
                  - Name: Suspicious email sending patterns detected
                    Disabled: false
                  - Name: Suspicious connector activity
                    Disabled: false
                  - Name: Suspicious Email Forwarding Activity
                    Disabled: false
                  - Name: Messages have been delayed
                    Disabled: false
                  - Name: Tenant restricted from sending unprovisioned email
                    Disabled: false
                  - Name: Tenant restricted from sending email
                    Disabled: false
                  - Name: A potentially malicious URL click was detected
                    Disabled: false
        Postconditions: []
        ExpectedResult: true

  - PolicyId: MS.SECURITYSUITE.5.2v1
    TestDriver: ScubaCached
    Tests:
      - TestDescription: MS.SECURITYSUITE.5.2v1 Non-Compliant case - No audit log retention policies exist
        Preconditions:
          - Command: UpdateProviderExport
            Splat:
              Updates:
                service_plans:
                  - ServicePlanName: M365_ADVANCED_AUDITING
                    ServicePlanId: 2f442157-a11c-46b9-ae5b-6e39ff4e5849
                    ProvisioningStatus: Success
                unified_audit_log_retention_policies: []
        Postconditions: []
        ExpectedResult: false
      - TestDescription: MS.SECURITYSUITE.5.2v1 Non-Compliant case - Retention duration is three months
        Preconditions:
          - Command: UpdateProviderExport
            Splat:
              Updates:
                service_plans:
                  - ServicePlanName: M365_ADVANCED_AUDITING
                    ServicePlanId: 2f442157-a11c-46b9-ae5b-6e39ff4e5849
                    ProvisioningStatus: Success
                unified_audit_log_retention_policies:
                  - Name: Three month retention
                    RetentionDuration: ThreeMonths
                    Enabled: true
        Postconditions: []
        ExpectedResult: false
      - TestDescription: MS.SECURITYSUITE.5.2v1 Non-Compliant case - Retention duration is six months
        Preconditions:
          - Command: UpdateProviderExport
            Splat:
              Updates:
                service_plans:
                  - ServicePlanName: M365_ADVANCED_AUDITING
                    ServicePlanId: 2f442157-a11c-46b9-ae5b-6e39ff4e5849
                    ProvisioningStatus: Success
                unified_audit_log_retention_policies:
                  - Name: Six month retention
                    RetentionDuration: SixMonths
                    Enabled: true
        Postconditions: []
        ExpectedResult: false
      - TestDescription: MS.SECURITYSUITE.5.2v1 Non-Compliant case - Retention duration is nine months
        Preconditions:
          - Command: UpdateProviderExport
            Splat:
              Updates:
                service_plans:
                  - ServicePlanName: M365_ADVANCED_AUDITING
                    ServicePlanId: 2f442157-a11c-46b9-ae5b-6e39ff4e5849
                    ProvisioningStatus: Success
                unified_audit_log_retention_policies:
                  - Name: Nine month retention
                    RetentionDuration: NineMonths
                    Enabled: true
        Postconditions: []
        ExpectedResult: false
      - TestDescription: MS.SECURITYSUITE.5.2v1 Non-Compliant case - A 12 month policy exists but is disabled
        Preconditions:
          - Command: UpdateProviderExport
            Splat:
              Updates:
                service_plans:
                  - ServicePlanName: M365_ADVANCED_AUDITING
                    ServicePlanId: 2f442157-a11c-46b9-ae5b-6e39ff4e5849
                    ProvisioningStatus: Success
                unified_audit_log_retention_policies:
                  - Name: 12 month retention
                    RetentionDuration: TwelveMonths
                    Enabled: false
        Postconditions: []
        ExpectedResult: false
      - TestDescription: MS.SECURITYSUITE.5.2v1 Non-Compliant case - E3/G3 license level lacks the advanced auditing service plan
        Preconditions:
          - Command: UpdateProviderExport
            Splat:
              Updates:
                service_plans:
                  - ServicePlanName: EXCHANGE_S_ENTERPRISE
                    ServicePlanId: efb87545-963c-4e0d-99df-69c6916d9eb0
                    ProvisioningStatus: Success
                unified_audit_log_retention_policies:
                  - Name: 12 month retention
                    RetentionDuration: TwelveMonths
                    Enabled: true
        Postconditions: []
        ExpectedResult: false
      - TestDescription: MS.SECURITYSUITE.5.2v1 Compliant case - A 12 month audit log retention policy exists
        Preconditions:
          - Command: UpdateProviderExport
            Splat:
              Updates:
                service_plans:
                  - ServicePlanName: M365_ADVANCED_AUDITING
                    ServicePlanId: 2f442157-a11c-46b9-ae5b-6e39ff4e5849
                    ProvisioningStatus: Success
                unified_audit_log_retention_policies:
                  - Name: 12 month retention
                    RetentionDuration: TwelveMonths
                    Enabled: true
        Postconditions: []
        ExpectedResult: true
      - TestDescription: MS.SECURITYSUITE.5.2v1 Compliant case - A 10 year audit log retention policy exists
        Preconditions:
          - Command: UpdateProviderExport
            Splat:
              Updates:
                service_plans:
                  - ServicePlanName: M365_ADVANCED_AUDITING
                    ServicePlanId: 2f442157-a11c-46b9-ae5b-6e39ff4e5849
                    ProvisioningStatus: Success
                unified_audit_log_retention_policies:
                  - Name: 10 year retention
                    RetentionDuration: TenYears
                    Enabled: true
        Postconditions: []
        ExpectedResult: true
      - TestDescription: MS.SECURITYSUITE.5.2v1 Compliant case - A 12 month policy exists alongside shorter policies
        Preconditions:
          - Command: UpdateProviderExport
            Splat:
              Updates:
                service_plans:
                  - ServicePlanName: M365_ADVANCED_AUDITING
                    ServicePlanId: 2f442157-a11c-46b9-ae5b-6e39ff4e5849
                    ProvisioningStatus: Success
                unified_audit_log_retention_policies:
                  - Name: Six month retention
                    RetentionDuration: SixMonths
                    Enabled: true
                  - Name: 12 month retention
                    RetentionDuration: TwelveMonths
                    Enabled: true
        Postconditions: []
        ExpectedResult: true
