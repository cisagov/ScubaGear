                  - Name: 7 year retention
                    RetentionDuration: SevenYears
                    Enabled: true
        Postconditions: []
        ExpectedResult: true
      - TestDescription: MS.SECURITYSUITE.5.2v1 Compliant case - A 10 year audit log retention policy exists
        Preconditions:
          - Command: UpdateProviderExport
            Splat:
              Updates:
