  - PolicyId: MS.EXO.6.1v1
    TestDriver: ScubaCached
    Tests:
      - TestDescription: MS.EXO.6.1v1 Non-Compliant case - Contacts shared with all domains
        Preconditions:
          - Command: UpdateProviderExport
            Splat:
              Updates:
                sharing_policy:
                  - Name: "Default Sharing Policy"
                    Domains:
                      - "ted.com:ContactsSharing"
                  - Name: "FunctionalTest ContactSharingAllDomains"
                    Domains:
                      - "*:ContactsSharing"
        Postconditions: []
        ExpectedResult: false
      - TestDescription: MS.EXO.6.1v1 Compliant case - Contacts NOT shared with all domains
        Preconditions:
          - Command: UpdateProviderExport
            Splat:
              Updates:
                sharing_policy:
                  - Name: "Default Sharing Policy"
                    Domains:
                      - "ted.com:ContactsSharing"
                  - Name: "FunctionalTest ContactSharingLimitedDomains"
                    Domains:
                      - "ted.com:ContactsSharing"
        Postconditions: []
        ExpectedResult: true

