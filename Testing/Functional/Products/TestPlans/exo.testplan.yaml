ProductName: exo
TestPlan:
  - PolicyId: MS.EXO.1.1v2
    TestDriver: ScubaCached
    Tests:
      - TestDescription: MS.EXO.1.1v2 Non-Compliant case - domains have auto forwarding Enabled
        Preconditions:
          - Command: UpdateProviderExport
            Splat:
              Updates:
                remote_domains:
                  - DomainName: "*"
                    AutoForwardEnabled: true
                  - DomainName: "contoso.com"
                    AutoForwardEnabled: true
        Postconditions: []
        ExpectedResult: false
      - TestDescription: MS.EXO.1.1v2 Compliant case - domains have auto forwarding Disabled
        Preconditions:
          - Command: UpdateProviderExport
            Splat:
              Updates:
                remote_domains:
                  - DomainName: "*"
                    AutoForwardEnabled: false
                  - DomainName: "contoso.com"
                    AutoForwardEnabled: false
        Postconditions: []
        ExpectedResult: true

  - PolicyId: MS.EXO.2.2v3
    TestDriver: ScubaCached
    Tests:
      - TestDescription: MS.EXO.2.2v3 Non-Compliant case - SPF policy is missing for one of the domains
        Preconditions:
          - Command: UpdateProviderExport
            Splat:
              Updates:
                spf_records:
                  - domain: bogus1.customdomain.com
                    message: "SPF record found."
                    compliant: true
                    rdata:
                      - "v=spf1 include:spf.protection.outlook.com -all"
                      - "mscid=Bn4gB0qhWRMD7Dh4RElnakA+/KDrYmzhXtdxOUlJcbSX7aCxUpA5DHeCW+8BvkeY5ioX8WqoM+Ay44R/m6qh3A=="
                  - domain: bogus2.onmicrosoft.com
                    message: "Domain name exists but no answers returned."
                    compliant: false
                    rdata: []
        Postconditions: []
        ExpectedResult: false
      - TestDescription: MS.EXO.2.2v3 Compliant case - SPF policy is published for the domains
        Preconditions:
          - Command: UpdateProviderExport
            Splat:
              Updates:
                spf_records:
                  - domain: bogus1.customdomain.com
                    message: "SPF record found."
                    compliant: true
                    rdata:
                      - "v=spf1 include:spf.protection.outlook.com -all"
                      - "mscid=Bn4gB0qhWRMD7Dh4RElnakA+/KDrYmzhXtdxOUlJcbSX7aCxUpA5DHeCW+8BvkeY5ioX8WqoM+Ay44R/m6qh3A=="
                  - domain: bogus2.onmicrosoft.com
                    message: "SPF record found."
                    compliant: true
                    rdata:
                      - "v=spf1 include:spf.protection.outlook.com -all"
                      - "mscid=Bn4gB0qhWRMD7Dh4RElnakA+/KDrYmzhXtdxOUlJcbSX7aCxUpA5DHeCW+8BvkeY5ioX8WqoM+Ay44R/m6qh3A=="
        Postconditions: []
        ExpectedResult: true

