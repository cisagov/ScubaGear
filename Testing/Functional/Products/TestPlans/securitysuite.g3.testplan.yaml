ProductName: securitysuite
TestPlan:
  - PolicyId: MS.SECURITYSUITE.1.1v1
    TestDriver: ScubaCached
    Tests:
      - TestDescription: MS.SECURITYSUITE.1.1v1 Not Checked # TODO update once implemented
        Preconditions: []
        Postconditions: []
        IsNotChecked: true
        ExpectedResult: false
  - PolicyId: MS.SECURITYSUITE.4.1v1
    TestDriver: ScubaCached
    Tests:
      - TestDescription: MS.SECURITYSUITE.4.1v1 Non-Compliant case - Required alert is disabled
        Preconditions:
          - Command: UpdateProviderExport
            Splat:
              Updates:
                protection_alerts:
                  - Name: Suspicious email sending patterns detected
                    Disabled: true
                  - Name: Suspicious connector activity
                    Disabled: false
                  - Name: Suspicious Email Forwarding Activity
                    Disabled: false
                  - Name: Messages have been delayed
                    Disabled: false
                  - Name: Tenant restricted from sending unprovisioned email
                    Disabled: false
                  - Name: Tenant restricted from sending email
                    Disabled: false
        Postconditions: []
        ExpectedResult: false
      - TestDescription: MS.SECURITYSUITE.4.1v1 Compliant case - Required alerts are enabled
        Preconditions:
          - Command: UpdateProviderExport
            Splat:
              Updates:
                protection_alerts:
                  - Name: Suspicious email sending patterns detected
                    Disabled: false
                  - Name: Suspicious connector activity
                    Disabled: false
                  - Name: Suspicious Email Forwarding Activity
                    Disabled: false
                  - Name: Messages have been delayed
                    Disabled: false
                  - Name: Tenant restricted from sending unprovisioned email
                    Disabled: false
                  - Name: Tenant restricted from sending email
                    Disabled: false
        Postconditions: []
        ExpectedResult: true

  - PolicyId: MS.SECURITYSUITE.5.2v1
    TestDriver: ScubaCached
    Tests:
      - TestDescription: MS.SECURITYSUITE.5.2v1 No E5 license or add-on case - A compliant 12 month policy exists but the advanced auditing service plan is not licensed
        Preconditions:
          - Command: UpdateProviderExport
            Splat:
              Updates:
                service_plans:
                  - ServicePlanName: EXCHANGE_S_ENTERPRISE
                    ServicePlanId: efb87545-963c-4e0d-99df-69c6916d9eb0
                    ProvisioningStatus: Success
                unified_audit_log_retention_policies:
                  - Name: 12 month retention
                    RetentionDuration: TwelveMonths
                    Enabled: true
        Postconditions: []
        ExpectedResult: false
