ProductName: teams
TestPlan:
  - PolicyId: MS.TEAMS.2.2v3
    TestDriver: RunScuba
    Tests:
      - TestDescription: MS.TEAMS.2.2v3 Non-compliant - AllowTeamsConsumerInbound; AllowTeamsConsumer
        Preconditions:
          - Command: Set-CsTenantFederationConfiguration
            Splat:
              AllowTeamsConsumer: true
              AllowTeamsConsumerInbound: true
        Postconditions: []
        ExpectedResult: false
      - TestDescription: MS.TEAMS.2.2v3 Compliant - DoNotAllowTeamsConsumerInbound; AllowTeamsConsumer
        Preconditions:
          - Command: Set-CsTenantFederationConfiguration
            Splat:
              AllowTeamsConsumer: true
              AllowTeamsConsumerInbound: false
        Postconditions: []
        ExpectedResult: true
      - TestDescription: MS.TEAMS.2.2v3 Compliant - AllowTeamsConsumerInbound; DoNotAllowTeamsConsumer
        Preconditions:
          - Command: Set-CsTenantFederationConfiguration
            Splat:
              AllowTeamsConsumer: false
              AllowTeamsConsumerInbound: true
        Postconditions: []
        ExpectedResult: true
      - TestDescription: MS.TEAMS.2.2v3 Compliant - DoNotAllowTeamsConsumerInbound; DoNotAllowTeamsConsumer
        Preconditions:
          - Command: Set-CsTenantFederationConfiguration
            Splat:
              AllowTeamsConsumer: false
              AllowTeamsConsumerInbound: false
        Postconditions: []
        ExpectedResult: true
  - PolicyId: MS.TEAMS.2.3v3
    TestDriver: RunScuba
    Tests:
      - TestDescription: MS.TEAMS.2.3v3 Non-compliant - AllowTeamsConsumer
        Preconditions:
          - Command: Set-CsTenantFederationConfiguration
            Splat:
              AllowTeamsConsumer: true
        Postconditions: []
        ExpectedResult: false
      - TestDescription: MS.TEAMS.2.3v3 Compliant - DoNotAllowTeamsConsumer
        Preconditions:
          - Command: Set-CsTenantFederationConfiguration
            Splat:
              AllowTeamsConsumer: false
        Postconditions: []
        ExpectedResult: true
  - PolicyId: MS.TEAMS.4.1v1
    TestDriver: RunScuba
    Tests:
      - TestDescription: MS.TEAMS.4.1v1 Not-applicable case - policy does not apply to GCC, GCC High, or DoD tenants
        Preconditions: []
        Postconditions: []
        ExpectedResult: true
